title: Oopsie Data
description: Tools for collecting, annotating, and managing robotic manipulation failure data — part of the Oopsie Data project.
theme: just-the-docs

url: "https://oopsie-data.com"
baseurl: ""

color_scheme: light

# Site-wide announcement banner (rendered via _includes/header_custom.html)
announcement:
  enabled: true
  badge: "Coming soon"
  text: "The Oopsie Data open beta launches soon — we're now accepting lab registrations."
  cta_text: "Register your lab"
  cta_link: "https://forms.gle/9arwZHAvRjvbozoT7"

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

aux_links:
  "Oopsie-Tools": "https://github.com/oopsie-data/oopsie-tools"

aux_links_new_tab: true

footer_content: "Oopsie Data — A large-scale dataset of robotic manipulation failures and suboptimal behavior."

back_to_top: true
back_to_top_text: "Back to top"

favicon_ico: /assets/images/favicon.ico

callouts:
  highlight:
    color: yellow
  note:
    color: blue
  important:
    title: Important
    color: blue
  warning:
    title: Warning
    color: red

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - DEVELOPMENT.md
  - Dockerfile
  - Dockerfile.full
  - docker-compose.yml
  - requirements-docs.txt
