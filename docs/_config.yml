title: Oopsie Data
description: Tools for collecting, annotating, and managing robotic manipulation failure data — part of the Oopsie Data project.
theme: just-the-docs

url: https://cvoelcker.github.io
baseurl: /robotic_failure_data

color_scheme: light

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

aux_links:
  "GitHub": "https://github.com/cvoelcker/robotic_failure_data"
  "Robotic Failure Dataset": "https://manipufail.github.io"

aux_links_new_tab: true

footer_content: "Oopsie Data — Tooling for the Oopsie Dataset."

back_to_top: true
back_to_top_text: "Back to top"

callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  warning:
    title: Warning
    color: red

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - DEVELOPMENT.md
  - Dockerfile
  - Dockerfile.full
  - docker-compose.yml
  - requirements-docs.txt
